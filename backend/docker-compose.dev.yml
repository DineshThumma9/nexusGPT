services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centralgpt_app
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrantdb:6333
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/centralgpt
      - NEO4J_URL=neo4j://neo4j:7687
    depends_on:
      - redis
      - qdrantdb
      - postgres
      - neo4j
    volumes:
      - .:/app
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --workers 2

  celery:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: centralgpt_celery
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrantdb:6333
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/centralgpt
      - NEO4J_URL=neo4j://neo4j:7687
    depends_on:
      - redis
      - qdrantdb
      - postgres
      - neo4j
    volumes:
      - .:/app
    command: celery -A src.service.background.worker.queue worker --loglevel=info --concurrency=2

  qdrantdb:
    image: qdrant/qdrant
    container_name: qdrantdb
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    image: postgres:15-alpine
    container_name: postgresdb
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=centralgpt
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  neo4j:
    image: neo4j:5.20
    container_name: neo4jdb
    environment:
      - NEO4J_AUTH=neo4j/password
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:6.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  caddy:
    image: caddy:latest
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  qdrant_data:
  redis_data:
  postgres_data:
  neo4j_data:
  caddy_data:
  caddy_config:
